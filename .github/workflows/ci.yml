name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional published release version to smoke-test (for example 2.2.10)
        required: false
        type: string

permissions:
  contents: read

jobs:
  static-tests:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: macOS static tests
        run: NODE="$(command -v node)" SKIP_LIVE_DOCTOR=true ./macos/tests/run-tests.sh
      - name: Windows cross-platform static tests
        run: ./windows/tests/run-tests.sh
      - name: Public identity and sponsorship guard
        run: |
          grep -Fq 'Codex Theme Switch · Codex 主题衣橱' README.md
          grep -Fq '目前暂无赞助商' README.md
          grep -Fq 'No sponsors yet' README.en.md
          ! grep -RniE 'passion8|aff=TuPe' README.md README.en.md docs macos windows themes

  windows-release-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build current-source Windows release archive
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_version == '' }}
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath '.\windows\VERSION' -Raw).Trim()
          $stage = Join-Path $env:RUNNER_TEMP 'current-release-stage'
          $bundle = Join-Path $stage "Codex Theme Wardrobe $version"
          $archive = Join-Path $env:RUNNER_TEMP "Codex-Theme-Wardrobe-v$version-windows.zip"
          Remove-Item -LiteralPath $stage, $archive -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path (Join-Path $bundle 'windows'), (Join-Path $bundle 'themes'), (Join-Path $bundle 'macos') | Out-Null
          Get-ChildItem -LiteralPath '.\windows' -Force | Where-Object { $_.Name -ne 'release' } |
            ForEach-Object { Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $bundle 'windows') -Recurse -Force }
          Get-ChildItem -LiteralPath '.\themes' -Force |
            ForEach-Object { Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $bundle 'themes') -Recurse -Force }
          Copy-Item -LiteralPath '.\macos\themes' -Destination (Join-Path $bundle 'macos\themes') -Recurse -Force
          Copy-Item -LiteralPath '.\README.md' -Destination (Join-Path $bundle 'README.zh-CN.md')
          Copy-Item -LiteralPath '.\windows\Install Codex Theme Wardrobe.cmd' -Destination (Join-Path $bundle 'Install Codex Theme Wardrobe.cmd')
          Compress-Archive -LiteralPath $bundle -DestinationPath $archive -CompressionLevel Optimal
          "ARCHIVE_PATH=$archive" >> $env:GITHUB_ENV
      - name: Download published Windows release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version != '' }}
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "Codex-Theme-Wardrobe-v$env:RELEASE_VERSION-windows.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/myxsf/CodexThemeSwitch/releases/download/v$env:RELEASE_VERSION/Codex-Theme-Wardrobe-v$env:RELEASE_VERSION-windows.zip" `
            -OutFile $archive
          "ARCHIVE_PATH=$archive" >> $env:GITHUB_ENV
      - name: Simulate clean Windows install
        shell: powershell
        run: |
          .\windows\tests\release-install-smoke.ps1 `
            -ArchivePath $env:ARCHIVE_PATH
